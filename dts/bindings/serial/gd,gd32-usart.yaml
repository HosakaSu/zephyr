description: GigaDevice USART

compatible: "gd,gd32-usart"

include: [uart-controller.yaml, reset-device.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  dmas:
    description: DMA channels for RX and TX

  dma-names:
    description: DMA channel names, expected to be "rx" and "tx"

  resets:
    required: true

  clocks:
    required: true
